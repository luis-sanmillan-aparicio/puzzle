<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Puzzle</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: monospace;
      color: white;
      touch-action: none;
      user-select: none;
    }
    h1 { font-size: 22px; margin-bottom: 24px; letter-spacing: 2px; }
    #menu, #game { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    button {
      background: #333;
      color: white;
      border: 2px solid #555;
      padding: 12px 32px;
      font-size: 18px;
      font-family: monospace;
      cursor: pointer;
      border-radius: 4px;
      width: 220px;
    }
    button:active { background: #555; }
    #board-container { position: relative; }
    #board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 3px;
      background: #333;
      border: 3px solid #555;
      touch-action: none;
    }
    .tile {
      width: 90px;
      height: 90px;
      cursor: pointer;
      display: block;
    }
    .tile-empty {
      width: 90px;
      height: 90px;
      background: #1a1a1a;
    }
    #moves { font-size: 18px; }
    #message {
      font-size: 16px;
      color: #aaa;
      text-align: center;
      padding: 0 16px;
    }
    #btn-solution {
      background: #1a3a1a;
      border-color: #2a6a2a;
    }
    #btn-solution.active {
      background: #2a6a2a;
      border-color: #00cc44;
      color: #00cc44;
    }
    #file-input { display: none; }
    #winner-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
      z-index: 10;
    }
    #winner-overlay.visible { display: flex; }
    #winner-overlay p { font-size: 28px; }
    #winner-overlay span { font-size: 18px; color: #aaa; }
  </style>
</head>
<body>

  <h1>PUZZLE</h1>

  <div id="menu">
    <button id="btn-play">Jugar</button>
    <button id="btn-change">Cambiar foto</button>
  </div>

  <div id="game" style="display:none">
    <div id="moves">Movimientos: 0</div>
    <div id="board-container">
      <div id="board"></div>
    </div>
    <div id="message"></div>
    <button id="btn-solution">Ver solución</button>
    <button id="btn-menu">Menú</button>
  </div>

  <div id="winner-overlay">
    <p>🎉 ¡Resuelto!</p>
    <span id="winner-moves"></span>
    <button id="btn-replay">Jugar de nuevo</button>
    <button id="btn-winner-menu">Menú</button>
  </div>

  <input type="file" id="file-input" accept="image/*"/>

  <script>
    const GRID = 4;
    const TILE = 90;
    const SHUFFLE_MOVES = 200;
    const SHUFFLE_ANIM_STEPS = 30;
    const SHUFFLE_ANIM_DELAY = 40;

    let tiles = [];
    let emptyIndex = GRID * GRID - 1;
    let moveCount = 0;
    let imageData = null;
    let touchStartX, touchStartY;
    let mouseStartX, mouseStartY, mouseTileIndex;
    let shuffling = false;
    let showingSolution = false;

    const menuEl = document.getElementById('menu');
    const gameEl = document.getElementById('game');
    const boardEl = document.getElementById('board');
    const movesEl = document.getElementById('moves');
    const messageEl = document.getElementById('message');
    const winnerOverlay = document.getElementById('winner-overlay');
    const winnerMoves = document.getElementById('winner-moves');
    const fileInput = document.getElementById('file-input');
    const btnPlay = document.getElementById('btn-play');
    const btnChange = document.getElementById('btn-change');
    const btnSolution = document.getElementById('btn-solution');

    window.onload = () => {
      imageData = localStorage.getItem('puzzle-image');
      if (!imageData) {
        fileInput.click();
      } else {
        showMenu();
      }
    };

    document.addEventListener('mouseup', e => {
      if (mouseTileIndex === null || mouseTileIndex === undefined) return;
      const index = mouseTileIndex;
      mouseTileIndex = null;
      const dx = e.clientX - mouseStartX;
      const dy = e.clientY - mouseStartY;
      const absDx = Math.abs(dx);
      const absDy = Math.abs(dy);
      if (absDx < 10 && absDy < 10) {
        moveTile(index);
      } else {
        const row = Math.floor(index / GRID);
        const col = index % GRID;
        const eRow = Math.floor(emptyIndex / GRID);
        const eCol = emptyIndex % GRID;
        if (absDx > absDy) {
          if (dx > 0 && eCol === col + 1 && eRow === row) moveTile(index);
          if (dx < 0 && eCol === col - 1 && eRow === row) moveTile(index);
        } else {
          if (dy > 0 && eRow === row + 1 && eCol === col) moveTile(index);
          if (dy < 0 && eRow === row - 1 && eCol === col) moveTile(index);
        }
      }
    });

    function showMenu() {
      menuEl.style.display = 'flex';
      gameEl.style.display = 'none';
      showingSolution = false;
    }

    function showGame() {
      menuEl.style.display = 'none';
      gameEl.style.display = 'flex';
    }

    btnPlay.onclick = () => {
      if (!imageData) { fileInput.click(); return; }
      startGame();
    };

    btnChange.onclick = () => {
      fileInput.click();
    };

    document.getElementById('btn-menu').onclick = () => {
      hideSolution();
      showMenu();
    };

    document.getElementById('btn-replay').onclick = () => {
      winnerOverlay.classList.remove('visible');
      startGame();
    };
    document.getElementById('btn-winner-menu').onclick = () => {
      winnerOverlay.classList.remove('visible');
      showMenu();
    };

    btnSolution.onclick = () => {
      if (shuffling) return;
      if (showingSolution) {
        hideSolution();
      } else {
        showSolution();
      }
    };

    function showSolution() {
      showingSolution = true;
      btnSolution.textContent = 'Volver';
      btnSolution.classList.add('active');
      const solvedTiles = Array.from({length: GRID * GRID}, (_, i) => i);
      renderBoardFromTiles(solvedTiles);
    }

    function hideSolution() {
      showingSolution = false;
      btnSolution.textContent = 'Ver solución';
      btnSolution.classList.remove('active');
      renderBoardFromTiles(tiles);
    }

    fileInput.onchange = e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        const img = new Image();
        img.onload = () => {
          const size = Math.min(img.width, img.height);
          const sx = (img.width - size) / 2;
          const sy = (img.height - size) / 2;
          const boardSize = GRID * TILE;
          const c = document.createElement('canvas');
          c.width = boardSize;
          c.height = boardSize;
          const cx = c.getContext('2d');
          cx.drawImage(img, sx, sy, size, size, 0, 0, boardSize, boardSize);
          imageData = c.toDataURL('image/jpeg', 0.85);
          localStorage.setItem('puzzle-image', imageData);
          showMenu();
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
      fileInput.value = '';
    };

    function startGame() {
      hideSolution();
      moveCount = 0;
      movesEl.textContent = 'Movimientos: 0';
      messageEl.textContent = '';
      tiles = Array.from({length: GRID * GRID}, (_, i) => i);
      emptyIndex = GRID * GRID - 1;
      showGame();
      renderBoard();
      animateShuffle();
    }

    function buildShuffleMoves() {
      const moves = [];
      let empty = GRID * GRID - 1;
      let last = -1;
      for (let i = 0; i < SHUFFLE_MOVES; i++) {
        const neighbors = getMovable(empty).filter(n => n !== last);
        const pick = neighbors[Math.floor(Math.random() * neighbors.length)];
        moves.push({ from: pick, to: empty });
        last = empty;
        empty = pick;
      }
      return moves;
    }

    function animateShuffle() {
      shuffling = true;
      const allMoves = buildShuffleMoves();

      tiles = Array.from({length: GRID * GRID}, (_, i) => i);
      emptyIndex = GRID * GRID - 1;
      allMoves.forEach(m => {
        tiles[m.to] = tiles[m.from];
        tiles[m.from] = GRID * GRID - 1;
        emptyIndex = m.from;
      });

      const animMoves = allMoves.slice(-SHUFFLE_ANIM_STEPS);

      let animTiles = Array.from({length: GRID * GRID}, (_, i) => i);
      let animEmpty = GRID * GRID - 1;
      allMoves.slice(0, SHUFFLE_MOVES - SHUFFLE_ANIM_STEPS).forEach(m => {
        animTiles[m.to] = animTiles[m.from];
        animTiles[m.from] = GRID * GRID - 1;
        animEmpty = m.from;
      });

      let step = 0;
      function doStep() {
        if (step >= animMoves.length) {
          shuffling = false;
          messageEl.textContent = '';
          return;
        }
        const m = animMoves[step];
        animTiles[m.to] = animTiles[m.from];
        animTiles[m.from] = GRID * GRID - 1;
        animEmpty = m.from;
        renderBoardFromTiles(animTiles);
        step++;
        setTimeout(doStep, SHUFFLE_ANIM_DELAY);
      }

      messageEl.textContent = 'Barajando...';
      doStep();
    }

    function getMovable(empty) {
      const row = Math.floor(empty / GRID);
      const col = empty % GRID;
      const result = [];
      if (row > 0) result.push(empty - GRID);
      if (row < GRID - 1) result.push(empty + GRID);
      if (col > 0) result.push(empty - 1);
      if (col < GRID - 1) result.push(empty + 1);
      return result;
    }

    function canMove(index) {
      return getMovable(emptyIndex).includes(index);
    }

    function moveTile(index) {
      if (shuffling || showingSolution) return;
      if (!canMove(index)) return;
      tiles[emptyIndex] = tiles[index];
      tiles[index] = GRID * GRID - 1;
      emptyIndex = index;
      moveCount++;
      movesEl.textContent = `Movimientos: ${moveCount}`;
      renderBoard();
      checkWin();
    }

    function checkWin() {
      if (tiles.every((t, i) => t === i)) {
        winnerMoves.textContent = `Lo resolviste en ${moveCount} movimientos`;
        winnerOverlay.classList.add('visible');
      }
    }

    function renderBoard() {
      renderBoardFromTiles(tiles);
    }

    function renderBoardFromTiles(t) {
      boardEl.innerHTML = '';
      const img = new Image();
      img.onload = () => {
        t.forEach((tileValue, index) => {
          if (tileValue === GRID * GRID - 1) {
            const empty = document.createElement('div');
            empty.className = 'tile-empty';
            boardEl.appendChild(empty);
            return;
          }

          const srcRow = Math.floor(tileValue / GRID);
          const srcCol = tileValue % GRID;

          const c = document.createElement('canvas');
          c.className = 'tile';
          c.width = TILE;
          c.height = TILE;
          const cx = c.getContext('2d');
          cx.drawImage(img, srcCol * TILE, srcRow * TILE, TILE, TILE, 0, 0, TILE, TILE);

          c.addEventListener('touchstart', e => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            e.preventDefault();
          }, { passive: false });

          c.addEventListener('touchend', e => {
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            const absDx = Math.abs(dx);
            const absDy = Math.abs(dy);
            if (absDx < 10 && absDy < 10) {
              moveTile(index);
            } else {
              const row = Math.floor(index / GRID);
              const col = index % GRID;
              const eRow = Math.floor(emptyIndex / GRID);
              const eCol = emptyIndex % GRID;
              if (absDx > absDy) {
                if (dx > 0 && eCol === col + 1 && eRow === row) moveTile(index);
                if (dx < 0 && eCol === col - 1 && eRow === row) moveTile(index);
              } else {
                if (dy > 0 && eRow === row + 1 && eCol === col) moveTile(index);
                if (dy < 0 && eRow === row - 1 && eCol === col) moveTile(index);
              }
            }
            e.preventDefault();
          }, { passive: false });

          c.addEventListener('mousedown', e => {
            mouseStartX = e.clientX;
            mouseStartY = e.clientY;
            mouseTileIndex = index;
          });

          boardEl.appendChild(c);
        });
      };
      img.src = imageData;
    }
  </script>
</body>
</html>
